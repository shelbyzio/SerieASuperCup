<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serie A Tournament Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        .scrollbar-hidden::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-[#003399] border-b-4 border-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-3 py-3 flex flex-row justify-between items-center gap-2">
            <div class="flex items-center gap-2">
                <div class="bg-white p-1 rounded-lg h-9 w-9 overflow-hidden flex items-center justify-center">
                    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/ab/Serie_A_ENILIVE_logo.svg/960px-Serie_A_ENILIVE_logo.svg.png" alt="Serie A" class="h-full w-full object-contain">
                </div>
                <div>
                    <h1 class="text-sm font-black text-white">SERIE <span class="text-white">A</span></h1>
                    <p class="text-[8px] text-blue-200 font-bold uppercase tracking-widest">THE ONE COMMUNITY</p>
                </div>
            </div>
            <div class="flex bg-white/20 p-0.5 rounded-lg border border-white/30">
                <button id="tab-fixtures-btn" onclick="switchTab('fixtures')" class="px-3 py-1.5 rounded-md text-[10px] font-bold text-[#003399] bg-white shadow-lg">Fixtures</button>
                <button id="tab-standings-btn" onclick="switchTab('standings')" class="px-3 py-1.5 rounded-md text-[10px] font-bold text-white">Standings</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-3 py-5 flex-1 w-full">
        <div id="tab-fixtures-content" class="space-y-4">
            <div class="bg-white border border-slate-200 rounded-xl p-3 shadow-sm">
                <span class="text-[10px] font-bold text-[#003399] uppercase mb-2 block">Matchday Selector</span>
                <div class="flex gap-2 overflow-x-auto scrollbar-hidden pb-1" id="matchday-selector-container"></div>
            </div>

            <div class="flex justify-between items-center bg-[#003399] p-3 rounded-xl shadow-lg">
                <h2 class="text-sm font-black text-white" id="fixture-round-title">ROUND 1</h2>
                <div class="flex gap-1">
                    <button onclick="changeMatchday(-1)" class="w-8 h-8 bg-white/20 rounded-lg text-white"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="changeMatchday(1)" class="w-8 h-8 bg-white/20 rounded-lg text-white"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-3" id="fixtures-grid"></div>
        </div>

        <div id="tab-standings-content" class="hidden space-y-4">
            <div class="bg-white border border-slate-200 rounded-xl overflow-x-auto text-[10px] shadow-sm">
                <table class="w-full text-center min-w-[500px]">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr class="text-slate-600">
                            <th class="py-3 px-2">#</th>
                            <th class="py-3 text-left pl-2">TEAM</th>
                            <th class="py-3">M</th>
                            <th class="py-3">W</th>
                            <th class="py-3">D</th>
                            <th class="py-3">L</th>
                            <th class="py-3">GD</th>
                            <th class="py-3 text-[#003399]">pts</th>
                        </tr>
                    </thead>
                    <tbody id="standings-table-body" class="divide-y divide-slate-100 font-medium text-slate-800"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const TEAMS_LIST = [
            { id: "INT", name: "Inter Milan", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/FC_Internazionale_Milano_2021.svg/250px-FC_Internazionale_Milano_2021.svg.png", tg: "https://t.me/Tomato_2k8" },
            { id: "MIL", name: "AC Milan", logo: "https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_of_AC_Milan.svg", tg: "https://t.me/myothetnaing56" },
            { id: "JUV", name: "Juventus", logo: "https://upload.wikimedia.org/wikipedia/commons/e/ed/Juventus_FC_-_logo_black_%28Italy%2C_2020%29.svg", tg: "https://t.me/Jame0988" },
            { id: "LAZ", name: "Lazio", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/c/ce/S.S._Lazio_badge.svg/1280px-S.S._Lazio_badge.svg.png", tg: "https://t.me/Masterdaddy358649" },
            { id: "ROM", name: "Roma", logo: "https://upload.wikimedia.org/wikipedia/en/f/f7/AS_Roma_logo_%282017%29.svg", tg: "https://t.me/Bhone3245" },
            { id: "FIO", name: "Fiorentina", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/ACF_Fiorentina_-_logo_%28Italy%2C_2022%29.svg/1280px-ACF_Fiorentina_-_logo_%28Italy%2C_2022%29.svg.png", tg: "https://t.me/ZINEZAME" },
            { id: "COM", name: "Como", logo: "https://upload.wikimedia.org/wikipedia/commons/9/99/Calcio_Como_-_logo_%28Italy%2C_2019-%29.svg", tg: "https://t.me/Ro_Min_Htet" },
            { id: "NAP", name: "Napoli", logo: "https://upload.wikimedia.org/wikipedia/commons/4/4d/SSC_Napoli_2025_%28white_and_azure%29.svg", tg: "https://t.me/lexaonyx" },
            { id: "ATA", name: "Atalanta", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Atalanta_BC_new_logo.svg/1280px-Atalanta_BC_new_logo.svg.png", tg: "https://t.me/ZawGay1234567890" },
            { id: "PAR", name: "Parma", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/Logo_Parma_Calcio_1913_%28adozione_2016%29.svg/1280px-Logo_Parma_Calcio_1913_%28adozione_2016%29.svg.png", tg: "https://t.me/ptkyaw87" },
            { id: "VER", name: "Verona", logo: "https://upload.wikimedia.org/wikipedia/en/9/92/Hellas_Verona_FC_logo_%282020%29.svg", tg: "https://t.me/Martivs22" },
            { id: "TOR", name: "Torino", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2e/Torino_FC_Logo.svg/1280px-Torino_FC_Logo.svg.png", tg: "https://t.me/Nashhll" }
        ].map(t => ({...t, mp:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0}));

        // EDIT RESULTS BELOW: hScore: 0, aScore: 0 ဆိုတဲ့နေရာမှာ အမှတ်ထည့်ပါ။
        // အမှတ်မထည့်ရသေးရင် null ထားပါ။
        const MATCH_RESULTS = {
            0: [{ home: 'INT', away: 'TOR', hScore: 2, aScore: 2 }, { home: 'MIL', away: 'VER', hScore: 11, aScore: 1 }, { home: 'JUV', away: 'PAR', hScore: 1, aScore: 4 }, { home: 'LAZ', away: 'ATA', hScore: 5, aScore: 4 }, { home: 'ROM', away: 'NAP', hScore: 3, aScore: 2 }, { home: 'FIO', away: 'COM', hScore: 2, aScore: 2 }],
            1: [{ home: 'MIL', away: 'TOR', hScore: 4, aScore: 6 }, { home: 'JUV', away: 'INT', hScore: 1, aScore: 4 }, { home: 'LAZ', away: 'VER', hScore: 8, aScore: 0 }, { home: 'ROM', away: 'PAR', hScore: 2, aScore: 4 }, { home: 'FIO', away: 'ATA', hScore: 2, aScore: 5 }, { home: 'COM', away: 'NAP', hScore: 2, aScore: 1 }],
            2: [{ home: 'JUV', away: 'TOR', hScore: 2, aScore: 4 }, { home: 'LAZ', away: 'MIL', hScore: 0, aScore: 2 }, { home: 'ROM', away: 'INT', hScore: 6, aScore: 2 }, { home: 'FIO', away: 'VER', hScore: 3, aScore: 1 }, { home: 'COM', away: 'PAR', hScore: 1, aScore: 2 }, { home: 'NAP', away: 'ATA', hScore: 3, aScore: 3 }],
            3: [{ home: 'LAZ', away: 'TOR', hScore: 0, aScore: 3 }, { home: 'ROM', away: 'JUV', hScore: 3, aScore: 4 }, { home: 'FIO', away: 'MIL', hScore: 0, aScore: 3 }, { home: 'COM', away: 'INT', hScore: 3, aScore: 1 }, { home: 'NAP', away: 'VER', hScore: 3, aScore: 1 }, { home: 'ATA', away: 'PAR', hScore: 2, aScore: 3 }],
            4: [{ home: 'NAP', away: 'MIL', hScore: 0, aScore: 3 }, { home: 'COM', away: 'JUV', hScore: 1, aScore: 4 }, { home: 'ATA', away: 'INT', hScore: 1, aScore: 2 }, { home: 'ROM', away: 'TOR', hScore: 2, aScore: 1 }, { home: 'FIO', away: 'LAZ', hScore: 3, aScore: 0 }, { home: 'PAR', away: 'VER', hScore: 6, aScore: 1 }],
            5: [{ home: 'FIO', away: 'TOR', hScore: 1, aScore: 3 }, { home: 'COM', away: 'ROM', hScore: 3, aScore: 2 }, { home: 'NAP', away: 'LAZ', hScore: 3, aScore: 0 }, { home: 'ATA', away: 'JUV', hScore: 0, aScore: 4 }, { home: 'PAR', away: 'MIL', hScore: 8, aScore: 8 }, { home: 'VER', away: 'INT', hScore: 0, aScore: 3 }],
            6: [{ home: 'COM', away: 'TOR', hScore: 1, aScore: 3 }, { home: 'NAP', away: 'FIO', hScore: 3, aScore: 2 }, { home: 'ATA', away: 'ROM', hScore: 1, aScore: 3 }, { home: 'PAR', away: 'LAZ', hScore: 3, aScore: 0 }, { home: 'VER', away: 'JUV', hScore: 0, aScore: 7 }, { home: 'INT', away: 'MIL', hScore: 1, aScore: 4 }],
            7: [{ home: 'NAP', away: 'TOR', hScore: null, aScore: null }, { home: 'ATA', away: 'COM', hScore: null, aScore: null }, { home: 'PAR', away: 'FIO', hScore: null, aScore: null }, { home: 'VER', away: 'ROM', hScore: null, aScore: null }, { home: 'INT', away: 'LAZ', hScore: null, aScore: null }, { home: 'MIL', away: 'JUV', hScore: null, aScore: null }],
            8: [{ home: 'ATA', away: 'TOR', hScore: null, aScore: null }, { home: 'PAR', away: 'NAP', hScore: null, aScore: null }, { home: 'VER', away: 'COM', hScore: null, aScore: null }, { home: 'INT', away: 'FIO', hScore: null, aScore: null }, { home: 'MIL', away: 'ROM', hScore: null, aScore: null }, { home: 'JUV', away: 'LAZ', hScore: null, aScore: null }],
            9: [{ home: 'PAR', away: 'TOR', hScore: null, aScore: null }, { home: 'VER', away: 'ATA', hScore: null, aScore: null }, { home: 'INT', away: 'NAP', hScore: null, aScore: null }, { home: 'MIL', away: 'COM', hScore: null, aScore: null }, { home: 'JUV', away: 'FIO', hScore: null, aScore: null }, { home: 'LAZ', away: 'ROM', hScore: null, aScore: null }],
            10: [{ home: 'VER', away: 'TOR', hScore: null, aScore: null }, { home: 'INT', away: 'PAR', hScore: null, aScore: null }, { home: 'MIL', away: 'ATA', hScore: null, aScore: null }, { home: 'JUV', away: 'NAP', hScore: null, aScore: null }, { home: 'LAZ', away: 'COM', hScore: null, aScore: null }, { home: 'ROM', away: 'FIO', hScore: null, aScore: null }]
        };

        let fixtures = [], currentViewingMatchday = 0, TOTAL_ROUNDS = 11;

        window.onload = function() { 
            generateFixedRoundRobinFixtures(); 
            calculateStandings();
            renderMatchdaySelector(); 
            renderFixtures(); 
        };

        function switchTab(tab) {
            document.getElementById('tab-fixtures-content').classList.toggle('hidden', tab !== 'fixtures');
            document.getElementById('tab-standings-content').classList.toggle('hidden', tab !== 'standings');
            document.getElementById('tab-fixtures-btn').className = tab === 'fixtures' ? "px-3 py-1.5 rounded-md text-[10px] font-bold text-[#003399] bg-white shadow-lg" : "px-3 py-1.5 rounded-md text-[10px] font-bold text-white";
            document.getElementById('tab-standings-btn').className = tab === 'standings' ? "px-3 py-1.5 rounded-md text-[10px] font-bold text-[#003399] bg-white shadow-lg" : "px-3 py-1.5 rounded-md text-[10px] font-bold text-white";
            if(tab === 'standings') updateStandingsTable();
        }

        function generateFixedRoundRobinFixtures() {
            const numTeams = TEAMS_LIST.length;
            for (let round = 0; round < numTeams - 1; round++) {
                const roundMatches = [];
                for (let i = 0; i < numTeams / 2; i++) {
                    const home = (round + i) % (numTeams - 1), away = (i === 0) ? numTeams - 1 : (numTeams - 1 - i + round) % (numTeams - 1);
                    roundMatches.push({ home: TEAMS_LIST[home].id, away: TEAMS_LIST[away].id });
                }
                fixtures.push(roundMatches);
            }
        }

        function calculateStandings() {
            TEAMS_LIST.forEach(t => { t.mp=0; t.w=0; t.d=0; t.l=0; t.gf=0; t.ga=0; t.gd=0; t.pts=0; });
            Object.values(MATCH_RESULTS).forEach(round => {
                round.forEach(match => {
                    if (match.hScore !== null && match.aScore !== null) {
                        const h = TEAMS_LIST.find(t => t.id === match.home);
                        const a = TEAMS_LIST.find(t => t.id === match.away);
                        if(!h || !a) return;
                        h.mp++; a.mp++;
                        h.gf += match.hScore; h.ga += match.aScore;
                        a.gf += match.aScore; a.ga += match.hScore;
                        h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
                        if (match.hScore > match.aScore) { h.pts += 3; h.w++; a.l++; }
                        else if (match.hScore < match.aScore) { a.pts += 3; a.w++; h.l++; }
                        else { h.pts += 1; a.pts += 1; h.d++; a.d++; }
                    }
                });
            });
        }

        function renderMatchdaySelector() {
            const container = document.getElementById('matchday-selector-container');
            container.innerHTML = '';
            for (let r = 0; r < TOTAL_ROUNDS; r++) {
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 px-3 py-1 rounded-lg font-bold text-[10px] border ${r === 0 ? 'bg-[#003399] text-white' : 'bg-white text-slate-500 border-slate-200'}`;
                btn.innerText = `R${r + 1}`;
                btn.onclick = () => { 
                    currentViewingMatchday = r; 
                    document.querySelectorAll('#matchday-selector-container button').forEach((b, idx) => {
                        b.className = `flex-shrink-0 px-3 py-1 rounded-lg font-bold text-[10px] border ${idx === r ? 'bg-[#003399] text-white' : 'bg-white text-slate-500 border-slate-200'}`;
                    });
                    renderFixtures(); 
                };
                container.appendChild(btn);
            }
        }

        function renderFixtures() {
            const container = document.getElementById('fixtures-grid');
            container.innerHTML = '';
            document.getElementById('fixture-round-title').innerText = `ROUND ${currentViewingMatchday + 1}`;
            if(!fixtures[currentViewingMatchday]) return;
            fixtures[currentViewingMatchday].forEach(match => {
                const h = TEAMS_LIST.find(t => t.id === match.home);
                const a = TEAMS_LIST.find(t => t.id === match.away);
                const result = MATCH_RESULTS[currentViewingMatchday]?.find(r => r.home === h.id && r.away === a.id);
                const hasScore = result && result.hScore !== null && result.aScore !== null;
                
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-100 rounded-xl p-3 flex items-center justify-between shadow-sm";
                card.innerHTML = `
                    <a href="${h.tg}" target="_blank" class="flex items-center gap-2 w-[40%] hover:opacity-70">
                        <img src="${h.logo}" class="w-8 h-8 object-contain"><span class="text-xs font-bold truncate text-slate-700">${h.name}</span>
                    </a>
                    <div class="flex flex-col items-center w-[20%]">
                        ${hasScore ? `<span class="text-[#003399] font-black text-sm">${result.hScore} - ${result.aScore}</span>` : '<span class="text-[#003399] font-black text-[10px]">VS</span>'}
                    </div>
                    <a href="${a.tg}" target="_blank" class="flex items-center gap-2 w-[40%] justify-end hover:opacity-70">
                        <span class="text-xs font-bold truncate text-slate-700">${a.name}</span><img src="${a.logo}" class="w-8 h-8 object-contain">
                    </a>`;
                container.appendChild(card);
            });
        }

        function updateStandingsTable() {
            calculateStandings();
            const tbody = document.getElementById('standings-table-body');
            const sortedTeams = [...TEAMS_LIST].sort((a, b) => b.pts - a.pts || b.gd - a.gd);
            tbody.innerHTML = sortedTeams.map((team, idx) => `
                <tr class="hover:bg-blue-50 transition-colors">
                    <td class="py-3 px-2 text-slate-500">${idx+1}</td>
                    <td class="text-left py-3 pl-2">
                        <a href="${team.tg}" target="_blank" class="flex items-center gap-2 hover:underline">
                            <img src="${team.logo}" class="w-5 h-5 object-contain"><span class="font-bold text-slate-800">${team.name}</span>
                        </a>
                    </td>
                    <td class="py-3">${team.mp}</td><td class="py-3">${team.w}</td><td class="py-3">${team.d}</td><td class="py-3">${team.l}</td>
                    <td class="py-3">${team.gd}</td><td class="py-3 font-black text-[#003399]">${team.pts}</td>
                </tr>
            `).join('');
        }
        
        function changeMatchday(d) {
            let n = currentViewingMatchday + d;
            if (n >= 0 && n < TOTAL_ROUNDS) { 
                currentViewingMatchday = n; 
                document.querySelectorAll('#matchday-selector-container button').forEach((b, idx) => {
                    b.className = `flex-shrink-0 px-3 py-1 rounded-lg font-bold text-[10px] border ${idx === n ? 'bg-[#003399] text-white' : 'bg-white text-slate-500 border-slate-200'}`;
                });
                renderFixtures(); 
            }
        }
    </script>
</body>
</html>
